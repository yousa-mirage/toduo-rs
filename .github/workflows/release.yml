name: Release Build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-upload:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
            bin_suffix: .exe
          - platform: ubuntu-latest
            os_name: linux
            bin_suffix: ""
          - platform: macos-latest
            os_name: macos
            bin_suffix: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Build
        run: just setup && just build

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p staging
          mkdir -p artifacts

          # Define source paths
          TUI_SRC="target/release/td${{ matrix.bin_suffix }}"
          GUI_SRC="target/release/ToDuo${{ matrix.bin_suffix }}"

          # Define destination names in staging
          TUI_DEST="staging/td${{ matrix.bin_suffix }}"
          GUI_DEST="staging/ToDuo${{ matrix.bin_suffix }}"

          # Copy to staging
          cp "$TUI_SRC" "$TUI_DEST"
          cp "$GUI_SRC" "$GUI_DEST"

          # Define archive name
          ARCHIVE_NAME="ToDuo-${{ matrix.os_name }}-amd64"

          # Create archive
          cd staging
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            7z a -tzip "../artifacts/$ARCHIVE_NAME.zip" *
          else
            tar -czf "../artifacts/$ARCHIVE_NAME.tar.gz" *
          fi
          cd ..

          echo "Packed artifacts:"
          ls -l artifacts/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📥 Installation / Download

            ### Windows
            1. Download `ToDuo-windows-amd64.zip`.
            2. Extract the archive.
            3. Run `ToDuo.exe` (GUI) or `td.exe` (TUI).

            ### macOS
            1. Download `ToDuo-macos-amd64.tar.gz`.
            2. Extract the archive.
            3. Run `./ToDuo` (GUI) or `./td` (TUI) in terminal.
            > **Note:** macOS may block the application. You might need to allow it in "System Settings > Privacy & Security" or run `xattr -d com.apple.quarantine ToDuo` in terminal if it fails to open.

            ### Linux
            1. Download `ToDuo-linux-amd64.tar.gz`.
            2. Extract the archive.
            3. Run `./ToDuo` or `./td`.
